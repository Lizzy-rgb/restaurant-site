<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" routerLink="/">{{ name }}</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            >Home</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/menu" routerLinkActive="active">Menu</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/my-order" routerLinkActive="active">My Order</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/faq" routerLinkActive="active">FAQ</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/help" routerLinkActive="active">Help</a>
        </li>
      </ul>

      @if (!authenticationService.currentUser()) {
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" routerLink="/sign-in">Sign In</a>
          <a class="btn btn-primary btn-sm" routerLink="/register">Register</a>
        </div>
      } @else {
        @if (firstName()) {
          <span class="navbar-greeting me-3">Hello, {{ firstName() }}!</span>
        }
        <div class="dropdown">
          <button
            class="btn btn-outline-light btn-sm dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            Account
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" routerLink="/profile">Profile</a></li>
            <li><a class="dropdown-item" routerLink="/settings">Settings</a></li>
            <li><a class="dropdown-item" routerLink="/help">Help</a></li>
            <li><hr class="dropdown-divider" /></li>
            <li><a class="dropdown-item" (click)="authenticationService.signOut()">Sign Out</a></li>
          </ul>
        </div>
      }
    </div>
  </div>
</nav>
