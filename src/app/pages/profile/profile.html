<h2 class="mb-4">Profile</h2>

<p [hidden]="!loading()" class="text-muted">Loading profile…</p>

<div class="row g-4">
  <div class="col-md-6 d-flex flex-column gap-4">
    <div class="profile-section">
      <h5 class="section-title">Display Name</h5>
      <label class="form-label">Name</label>
      <input [(ngModel)]="name" type="text" class="form-control mb-3" />
      @if (nameMessage()) {
        <p
          class="small mb-2"
          [class.text-success]="nameMessage() === 'Saved!'"
          [class.text-danger]="nameMessage() !== 'Saved!'"
        >
          {{ nameMessage() }}
        </p>
      }
      <button class="btn btn-primary" (click)="saveName()">Save Name</button>
    </div>

    <div class="profile-section">
      <h5 class="section-title">Email</h5>
      <label class="form-label">New Email</label>
      <input [(ngModel)]="email" type="email" class="form-control mb-3" />
      @if (emailMessage()) {
        <p
          class="small mb-2"
          [class.text-success]="emailMessage() === 'Saved!'"
          [class.text-danger]="emailMessage() !== 'Saved!'"
        >
          {{ emailMessage() }}
        </p>
      }
      <button class="btn btn-primary" (click)="saveEmail()">Save Email</button>
    </div>

    <div class="profile-section">
      <h5 class="section-title">Password</h5>
      <label class="form-label">New Password</label>
      <input [(ngModel)]="newPassword" type="password" class="form-control mb-3" />
      <label class="form-label">Confirm Password</label>
      <input [(ngModel)]="confirmPassword" type="password" class="form-control mb-3" />
      @if (passwordMessage()) {
        <p
          class="small mb-2"
          [class.text-success]="passwordMessage() === 'Saved!'"
          [class.text-danger]="passwordMessage() !== 'Saved!'"
        >
          {{ passwordMessage() }}
        </p>
      }
      <button class="btn btn-primary" (click)="savePassword()">Save Password</button>
    </div>
  </div>

  <div class="col-md-6">
    <div class="profile-section">
      <h5 class="section-title">Address</h5>
      <label class="form-label">Street</label>
      <input [(ngModel)]="street" type="text" class="form-control mb-3" />
      <label class="form-label">City</label>
      <input [(ngModel)]="city" type="text" class="form-control mb-3" />
      <label class="form-label">State</label>
      <input [(ngModel)]="state" type="text" class="form-control mb-3" />
      <label class="form-label">ZIP</label>
      <input [(ngModel)]="zip" type="text" class="form-control mb-3" />
      @if (addressMessage()) {
        <p
          class="small mb-2"
          [class.text-success]="addressMessage() === 'Saved!'"
          [class.text-danger]="addressMessage() !== 'Saved!'"
        >
          {{ addressMessage() }}
        </p>
      }
      <button class="btn btn-primary" (click)="saveAddress()">Save Address</button>
    </div>
  </div>
</div>
