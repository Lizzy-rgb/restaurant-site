<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="mb-4">Sign In</h2>

        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input #emailInput type="email" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input #passwordInput type="password" class="form-control" />
        </div>

        <button
          class="btn btn-primary w-100"
          (click)="signIn(emailInput.value, passwordInput.value)"
        >
          Sign In
        </button>

        <p class="mt-3 mb-0">New around here? <a routerLink="/register">Sign up</a></p>
      </div>
    </div>
  </div>
</div>
