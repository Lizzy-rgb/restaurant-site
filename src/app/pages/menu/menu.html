<div class="d-flex flex-wrap gap-2 mb-4">
    <button class="btn btn-info text-white">Filter</button>
    <input class="form-control w-auto flex-grow-1" type="text" placeholder="Search menu items" />
    <button class="btn btn-primary">Search</button>
  </div>
  
  <div class="row g-4">
    @for (item of menuItems; track item.id) {
      <div class="col-md-4">
        <div class="card h-100 shadow-sm">
          <div class="menu-image-placeholder d-flex align-items-center justify-content-center">
            Image of Food
          </div>
          <div class="card-body">
            <h5 class="card-title">{{ item.name }}</h5>
            <p class="card-text">{{ item.description }}</p>
            <p class="fw-bold mb-3">${{ item.price }}</p>
            <a class="btn btn-primary" [routerLink]="['/menu', item.id]">Add to Order</a>
          </div>
        </div>
      </div>
    }
  </div>
