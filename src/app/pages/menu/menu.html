<div class="d-flex flex-wrap gap-2 mb-4">
  <button class="btn btn-info text-white">Filter</button>
  <input class="form-control w-auto flex-grow-1" type="text" placeholder="Search menu items" />
  <button class="btn btn-primary">Search</button>
</div>

<div class="row g-4">
  @for (item of menuItems; track $index) {
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="{{ item.picture }}" class="card-img-top" alt="{{ item.name }}" />
        <div class="card-body">
          <h5 class="card-title">{{ item.name }}</h5>
          <p class="card-text">{{ item.description }}</p>
          @for (allergen of item.allergens; track $index) {
            <span class="badge text-bg-warning">{{ allergen }}</span>
          }
          <p class="fw-bold mb-3">${{ item.price }}</p>
          <a class="btn btn-primary" [routerLink]="['/menu', item.name]">Add to Order</a>
        </div>
      </div>
    </div>
  }
</div>
