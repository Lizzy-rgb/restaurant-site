<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="mb-4">Register</h2>

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input #nameInput type="text" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input #emailInput type="email" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            #passwordInput
            type="password"
            class="form-control"
            placeholder="Please use at least 8 characters"
          />
        </div>

        <button
          class="btn btn-primary w-100"
          (click)="register(nameInput.value, emailInput.value, passwordInput.value)"
        >
          Create Account
        </button>
        <p class="mt-3 mb-0">Already have an account? <a routerLink="/sign-in">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
